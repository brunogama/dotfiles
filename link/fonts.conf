-fonts-conf-LC696">		Dont do this, overriding freesans will cause utf fonts to be come rubbish in chrome</div><div class="line" id="file-fonts-conf-LC697">	--&gt;</div><div class="line" id="file-fonts-conf-LC698">	&lt;!--</div><div class="line" id="file-fonts-conf-LC699">	&lt;match target=&quot;pattern&quot;&gt;</div><div class="line" id="file-fonts-conf-LC700">	&lt;test qual=&quot;any&quot; name=&quot;family&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC701">	&lt;string&gt;FreeSans&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC702">	&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC703">	&lt;edit name=&quot;family&quot; mode=&quot;prepend&quot; binding=&quot;same&quot;&gt;</div><div class="line" id="file-fonts-conf-LC704">	&lt;string&gt;Arial&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC705">	&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC706">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC707">	--&gt;</div><div class="line" id="file-fonts-conf-LC708">	&lt;!--</div><div class="line" id="file-fonts-conf-LC709">		ON web pages if font family is like this</div><div class="line" id="file-fonts-conf-LC710">		</div><div class="line" id="file-fonts-conf-LC711">		font-family: &#39;Helvetica Neue&#39;, arial, sans-serif;</div><div class="line" id="file-fonts-conf-LC712">		</div><div class="line" id="file-fonts-conf-LC713">		google chrome will immediately move to next font, if it does not find the first, even if there are append entries</div><div class="line" id="file-fonts-conf-LC714">		But firefox will take the append entry if the font does not exist :)</div><div class="line" id="file-fonts-conf-LC715">	--&gt;</div><div class="line" id="file-fonts-conf-LC716">	&lt;match target=&quot;pattern&quot;&gt;</div><div class="line" id="file-fonts-conf-LC717">		&lt;test qual=&quot;any&quot; name=&quot;family&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC718"