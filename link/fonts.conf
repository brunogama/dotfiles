 class="line" id="file-fonts-conf-LC233">		Does not work in Chrome properly</div><div class="line" id="file-fonts-conf-LC234">		In chrome 13px evalutes to 17.4px pixelsize test, funny!</div><div class="line" id="file-fonts-conf-LC235">	--&gt;</div><div class="line" id="file-fonts-conf-LC236">	&lt;match target=&quot;font&quot;&gt;</div><div class="line" id="file-fonts-conf-LC237">		&lt;test qual=&quot;any&quot; name=&quot;family&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC238">			&lt;string&gt;Georgia&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC239">			&lt;string&gt;Lucida Sans&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC240">			&lt;string&gt;Lucida Sans Typewriter&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC241">			&lt;!-- Microsoft Sans Serif has no italic and uses artificial oblique --&gt;</div><div class="line" id="file-fonts-conf-LC242">			&lt;string&gt;Microsoft Sans Serif&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC243">			&lt;!-- Tahoma has no italic and uses artificial oblique --&gt;</div><div class="line" id="file-fonts-conf-LC244">			&lt;string&gt;Tahoma&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC245">			&lt;string&gt;Trebuchet MS&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC246">			&lt;string&gt;Verdana&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC247">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC248">		&lt;test qual=&quot;any&quot; name=&quot;pixelsize&quot; compare=&quot;less_eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC249">			&lt;double&gt;16.1&lt;/double&gt;</div><div class="line" id="file-fonts-conf-LC250">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC251">		&lt;test qual=&quot;any&quot; name=&quot;weight&quot; compare=&quot;less_eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC252">			&lt;const&gt;medium&lt;/const&gt;</div><div class="line" id="file-font