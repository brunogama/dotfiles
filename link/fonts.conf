lt;match target=&quot;pattern&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1402">		&lt;test qual=&quot;any&quot; name=&quot;family&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1403">			&lt;string&gt;monospace&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1404">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC1405">		&lt;edit name=&quot;family&quot; mode=&quot;prepend&quot; binding=&quot;same&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1406">			&lt;string&gt;Droid Sans Mono&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1407">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1408">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC1409">&nbsp;</div><div class="line" id="file-fonts-conf-LC1410">	&lt;!-- use droid sans mono for sans-serif --&gt;</div><div class="line" id="file-fonts-conf-LC1411">	&lt;match target=&quot;pattern&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1412">		&lt;test qual=&quot;any&quot; name=&quot;family&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1413">			&lt;string&gt;sans-serif&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1414">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC1415">		&lt;edit name=&quot;family&quot; mode=&quot;prepend&quot; binding=&quot;same&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1416">			&lt;string&gt;Noto Sans&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1417">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1418">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC1419">&nbsp;</div><div class="line" id="file-fonts-conf-LC1420">	&lt;!-- use droid sans mono for Courier New --&gt;</div><div class="line" id="file-fonts-conf-LC1421">	&lt;match target=&quot;pattern&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1422">		&lt;test qual=&quot;any&quot; name=&quot;family&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1423">			&lt;string&gt;Courier New&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1424">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC1425">		&lt;edit name=&quot;family&quot; mode=&quot;prepend&quot; binding=&quot;same&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1426">			&lt;string&gt;Droid Sans Mono&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1427">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1428">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC1429">&nbsp;</div><div class="line" id="file-fonts-conf-LC1430">&nbsp;</div><div class="line" id="file-fonts-conf-LC1431">&nbsp;</div><div class="line" id="file-fonts-conf-LC1432">&nbsp;</div><div class="line" id="file-fonts-conf-LC1433">&nbsp;</div><div class="line" id="file-fonts-conf-LC1434">&nbsp;</div><div class="line" id="file-fonts-conf-LC1435">	&lt;!-- replace times new roman with droid serif --&gt;</div><div class="line" id="file-fonts-conf-LC1436">	&lt;match target=&quot;pattern&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1437">		&lt;test qual=&quot;any&quot; name=&quot;family&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1438">			&lt;string&gt;Times New Roman&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1439">			&lt;string&gt;serif&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1440">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC1441">		</div><div class="line" id="file-fonts-conf-LC1442">		&lt;edit name=&quot;family&quot; mode=&quot;prepend&quot; binding=&quot;same&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1443">			&lt;string&gt;Noto Serif&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1444">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1445">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC1446">	</div><div class="line" id="file-fonts-conf-LC1447">	</div><div class="line" id="file-fonts-conf-LC1448">	&lt;!-- lucida grande bold, with hintfull, becomes stiff looking, with 1 part of a letter more fat than the other, therefor hintslight--&gt;</div><div class="line" id="file-fonts-conf-LC1449">	&lt;match target=&quot;font&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1450">		&lt;test qual=&quot;any&quot; name=&quot;family&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1451">			&lt;string&gt;Lucida Grande&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1452">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC1453">		&lt;test qual=&quot;any&quot; name=&quot;weight&quot; compare=&quot;more&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1454">			&lt;const&gt;medium&lt;/const&gt;</div><div class="line" id="file-fonts-conf-LC1455">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC1456">		&lt;edit mode=&quot;assign&quot; name=&quot;hintstyle&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1457">			&lt;const&gt;hintslight&lt;/const&gt;</div><div class="line" id="file-fonts-conf-LC1458">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1459">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC1460">&nbsp;</div><div class="line" id="file-fonts-conf-LC1461">	</div><div class="line" id="file-fonts-conf-LC1462">	&lt;!-- lucida grande bold, with hintfull, becomes stiff looking, with 1 part of a letter more fat than the other, therefor hintslight--&gt;</div><div class="line" id="file-fonts-conf-LC1463">	&lt;match target=&quot;font&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1464">		&lt;test qual=&quot;any&quot; name=&quot;family&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1465">			&lt;string&gt;Lucida Console&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1466">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC1467">		&lt;edit name=&quot;antialias&quot; mode=&quot;assign&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1468">			&lt;bool&gt;true&lt;/bool&gt;</div><div class="line" id="file-fonts-conf-LC1469">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1470">		&lt;edit mode=&quot;assign&quot; name=&quot;autohint&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1471">			&lt;bool&gt;false&lt;/bool&gt;</div><div class="line" id="file-fonts-conf-LC1472">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1473">		&lt;edit mode=&quot;assign&quot; name=&quot;hintstyle&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1474">			&lt;const&gt;hintfull&lt;/const&gt;</div><div class="line" id="file-fonts-conf-LC1475">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1476">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC1477">	</div><div class="line" id="file-fonts-conf-LC1478">	&lt;!--</div><div class="line" id="file-fonts-conf-LC1479">		Open sans WITHOUT autohint, becomes fattish in chrome/firefox</div><div class="line" id="file-fonts-conf-LC1480">		WITH autohint, becomes crytalline, very good</div><div class="line" id="file-fonts-conf-LC1481">		but like noto sans, the bold version is not beautiful</div><div class="line" id="file-fonts-conf-LC1482">		need to fix : TODO</div><div class="line" id="file-fonts-conf-LC1483">	--&gt;</div><div class="line" id="file-fonts-conf-LC1484">	&lt;match target=&quot;font&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1485">		&lt;test compare=&quot;eq&quot; name=&quot;family&quot; qual=&quot;any&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1486">			&lt;string&gt;Open Sans&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1487">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC1488">		&lt;edit mode=&quot;assign&quot; name=&quot;autohint&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1489">			&lt;bool&gt;true&lt;/bool&gt;</div><div class="line" id="file-fonts-conf-LC1490">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1491">		&lt;edit mode=&quot;assign&quot; name=&quot;hintstyle&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1492">			&lt;const&gt;hintfull&lt;/const&gt;</div><div class="line" id="file-fonts-conf-LC1493">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1494">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC1495">&nbsp;</div><div class="line" id="file-fonts-conf-LC1496">	</div><div class="line" id="file-fonts-conf-LC1497">&nbsp;</div><div class="line" id="file-fonts-conf-LC1498">	</div><div class="line" id="file-fonts-conf-LC1499">	&lt;!-- </div><div class="line" id="file-fonts-conf-LC1500">		Styling for hindi fonts</div><div class="line" id="file-fonts-conf-LC1501">		Hindi (hi) </div><div class="line" id="file-fonts-conf-LC1502">	--&gt;</div><div class="line" id="file-fonts-conf-LC1503">	&lt;!-- force Lohit Hindi for hindi font --&gt;</div><div class="line" id="file-fonts-conf-LC1504">	&lt;match target=&quot;pattern&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1505">		&lt;test compare=&quot;eq&quot; name=&quot;lang&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1506">			&lt;string&gt;hi&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1507">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC1508">		&lt;edit binding=&quot;strong&quot; mode=&quot;prepend&quot; name=&quot;family&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1509">			&lt;string&gt;Lohit Hindi&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1510">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1511">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC1512">&nbsp;</div><div class="line" id="file-fonts-conf-LC1513">	&lt;!-- do some antialiasing tweak for gargi and lohit hindi font --&gt;</div><div class="line" id="file-fonts-conf-LC1514">	&lt;match target=&quot;font&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1515">		&lt;test compare=&quot;eq&quot; name=&quot;family&quot; qual=&quot;any&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1516">			&lt;string&gt;gargi&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1517">			&lt;string&gt;Lohit Hindi&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1518">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC1519">		&lt;edit mode=&quot;assign&quot; name=&quot;antialias&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1520">			&lt;bool&gt;true&lt;/bool&gt;</div><div class="line" id="file-fonts-conf-LC1521">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1522">		&lt;edit mode=&quot;assign&quot; name=&quot;autohint&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1523">			&lt;bool&gt;true&lt;/bool&gt;</div><div class="line" id="file-fonts-conf-LC1524">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1525">		&lt;edit mode=&quot;assign&quot; name=&quot;hintstyle&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1526">			&lt;const&gt;hintslight&lt;/const&gt;</div><div class="line" id="file-fonts-conf-LC1527">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1528">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC1529">&nbsp;</div><div class="line" id="file-fonts-conf-LC1530">	&lt;!-- Replace mangal with lohit hindi, mangal is a stupid font --&gt;</div><div class="line" id="file-fonts-conf-LC1531">	&lt;match target=&quot;pattern&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1532">		&lt;test compare=&quot;eq&quot; name=&quot;family&quot; qual=&quot;any&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1533">			&lt;string&gt;mangal&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1534">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC1535">		&lt;edit binding=&quot;strong&quot; mode=&quot;assign&quot; name=&quot;family&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1536">			&lt;string&gt;Lohit Hindi&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1537">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1538">	&lt;/match&gt; </div><div class="line" id="file-fonts-conf-LC1539">	&lt;!-- Hindi (hi) ends --&gt;</div><div class="line" id="file-fonts-conf-LC1540">&nbsp;</div><div class="line" id="file-fonts-conf-LC1541">&lt;/fontconfig&gt;</div><div class="line" id="file-fonts-conf-LC1542"> </div></pre>
