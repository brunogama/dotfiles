ring&gt;Arial&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC786">	&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC787">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC788">&nbsp;</div><div class="line" id="file-fonts-conf-LC789">	&lt;match target=&quot;pattern&quot;&gt;</div><div class="line" id="file-fonts-conf-LC790">	&lt;test qual=&quot;any&quot; name=&quot;family&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC791">	&lt;string&gt;MgOpen Moderna&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC792">	&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC793">	&lt;edit name=&quot;family&quot; mode=&quot;prepend&quot; binding=&quot;same&quot;&gt;</div><div class="line" id="file-fonts-conf-LC794">	&lt;string&gt;Arial&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC795">	&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC796">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC797">&nbsp;</div><div class="line" id="file-fonts-conf-LC798">	&lt;match target=&quot;pattern&quot;&gt;</div><div class="line" id="file-fonts-conf-LC799">	&lt;test qual=&quot;any&quot; name=&quot;family&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC800">	&lt;string&gt;System&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC801">	&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC802">	&lt;edit name=&quot;family&quot; mode=&quot;prepend&quot; binding=&quot;same&quot;&gt;</div><div class="line" id="file-fonts-conf-LC803">	&lt;string&gt;Arial&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC804">	&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC805">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC806">&nbsp;</div><div class="line" id="file-fonts-conf-LC807">	&lt;match target=&quot;pattern&quot;&gt;</div><div class="line" id="file-fonts-conf-LC808">	&lt;test qual=&quot;any&quot; name=&quot;family&quot; co