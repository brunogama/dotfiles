            <div class="comment-body markdown-body markdown-format js-comment-body">
                <p>Great stuff, thanks! I <a href="https://gist.github.com/odony/6173112">forked it</a> to get rid of the many warnings "Having multiple values in  isn't supported and may not work as expected" you get with the latest versions of fontconfig, due to this <a href="http://cgit.freedesktop.org/fontconfig/commit/?id=2837c63876b9b1f27d74aad51d45fc18d48f4652">commit</a>. </p>

<p>As I was not sure if the original code was having the intended effect, I used the recommended way to disambiguate the multiple  values: split them in multiple <code>&lt;match&gt;</code> elements.</p>

<p>See also this relevant Ubuntu <a href="https://bugs.launchpad.net/ubuntu/+source/fonts-unfonts-core/+bug/1034928">bug report</a>.</p>
