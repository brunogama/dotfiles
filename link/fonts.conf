="file-fonts-conf-LC1229">	&lt;!-- </div><div class="line" id="file-fonts-conf-LC1230">		</div><div class="line" id="file-fonts-conf-LC1231">		Behavioug is similar to droid sans,</div><div class="line" id="file-fonts-conf-LC1232">	</div><div class="line" id="file-fonts-conf-LC1233">		WITHOUT AUTOHINTER</div><div class="line" id="file-fonts-conf-LC1234">		</div><div class="line" id="file-fonts-conf-LC1235">		1. becomes smallish, like droid sans, very small on desktop , </div><div class="line" id="file-fonts-conf-LC1236">		2. DESKTOP - HIGHLY PROPORTIONATE, HIGHLY CLEAR</div><div class="line" id="file-fonts-conf-LC1237">		2. WEBPAGES - less clearer - vertical stands become hazy </div><div class="line" id="file-fonts-conf-LC1238">		3. slightly less STRETCHED</div><div class="line" id="file-fonts-conf-LC1239">		</div><div class="line" id="file-fonts-conf-LC1240">		WITH AUTOHINTER :</div><div class="line" id="file-fonts-conf-LC1241">		</div><div class="line" id="file-fonts-conf-LC1242">		1. very slightly STRETCHED</div><div class="line" id="file-fonts-conf-LC1243">		2. CRYSTAL CLARITY on webpages,  </div><div class="line" id="file-fonts-conf-LC1244">		3. lesser proportionate on desktop, CLARITY KIND OF OK OK</div><div class="line" id="file-fonts-conf-LC1245">		3. bold font ugly with hintfull, good with hintslight</div><div class="line" id="file-fonts-conf-LC1246">		</div><div class="line" id="file-fonts-conf-LC1247">		</div><div class="line" id="file-fonts-conf-LC1248">		Since we are using noto sans as arial replacement, hint it fully with autohinter.</div><div class="line" id="file-fonts-conf-LC1249">		</div><div class="line" id="file-fonts-conf-LC1250">		hintslight will compromise clarity</div><div class="line" id="file-fonts-conf-LC1251">		</div><div class="line" id="file-fonts-conf-LC1252">		thought of doing this, above 12px autohint = false</div><div class="line" id="file-fonts-conf-LC1253">		below 13px authint = true</div><div class="line" id="file-fonts-conf-LC1254">		but autohint false leads to loss of clarity, but makes width correct</div><div class="line" id="file-fonts-conf-LC1255">		moreover chrome does not obey pixelsize correctly</div><div class="line" id="file-fonts-conf-LC1256">	--&gt;</div><div class="line" id="file-fonts-conf-LC1257">	&lt;match target=&quot;font&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1258">		&lt;test qual=&quot;any&quot; name=&quot;family&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1259">			&lt;string&gt;noto sans&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1260">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC1261">		&lt;edit mode=&quot;assign&quot; name=&quot;autohint&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1262">			&lt;bool&gt;true&lt;/bool&gt;</div><div class="line" id="file-fonts-conf-LC1263">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1264">		&lt;edit mode=&quot;assign&quot; name=&quot;hintstyle&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1265">			&lt;const&gt;hintfull&lt;/const&gt;</div><div class="line" id="file-fonts-conf-LC1266">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1267">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC1268">	</div><div class="line" id="file-fonts-conf-LC1269">	</div><div class="line" id="file-fonts-conf-LC1270">	&lt;match target=&quot;font&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1271">		&lt;test qual=&quot;any&quot; name=&quot;family&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1272">			&lt;string&gt;ubuntu&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1273">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC1274">		&lt;edit mode=&quot;assign&quot; name=&quot;autohint&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1275">			&lt;bool&gt;true&lt;/bool&gt;</div><div class="line" id="file-fonts-conf-LC1276">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1277">		&lt;edit mode=&quot;assign&quot; name=&quot;hintstyle&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1278">			&lt;const&gt;hintfull&lt;/const&gt;</div><div class="line" id="file-fonts-conf-LC1279">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1280">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC1281">	</div><div class="line" id="file-fonts-conf-LC1282">	&lt;!--</div><div class="line" id="file-fonts-conf-LC1283">		DROID SANS</div><div class="line" id="file-fonts-conf-LC1284">		</div><div class="line" id="file-fonts-conf-LC1285">		WITHOUT AUTOHINTER</div><div class="line" id="file-fonts-conf-LC1286">		1.CLEARER 13px onwards</div><div class="line" id="file-fonts-conf-LC1287">		2. 12px on webpages very small</div><div class="line" id="file-fonts-conf-LC1288">		3. super clear at 12px</div><div class="line" id="file-fonts-conf-LC1289">		4. 9pt desktop super clear, super PROPORTIONATE</div><div class="line" id="file-fonts-conf-LC1290">		</div><div class="line" id="file-fonts-conf-LC1291">		</div><div class="line" id="file-fonts-conf-LC1292">		AUTOHINT = TRUE</div><div class="line" id="file-fonts-conf-LC1293">		1. LESS CLEARER</div><div class="line" id="file-fonts-conf-LC1294">		2. &#39;n&#39; is cramped</div><div class="line" id="file-fonts-conf-LC1295">		3. 9pt desktop, slightly distorted</div><div class="line" id="file-fonts-conf-LC1296">		4. 12px webpage is normal sized, but not great as noto sans with autohint = true. but better than arial</div><div class="line" id="file-fonts-conf-LC1297">		</div><div class="line" id="file-fonts-conf-LC1298">		</div><div class="line" id="file-fonts-conf-LC1299">		</div><div class="line" id="file-fonts-conf-LC1300">		droid sans with autohinter, becomes more disproportionate on gnome, this is lesser with noto sans</div><div class="line" id="file-fonts-conf-LC1301">		</div><div class="line" id="file-fonts-conf-LC1302">		in browser there is not much difference between autohint true/false</div><div class="line" id="file-fonts-conf-LC1303">		true leads to clarity loss</div><div class="line" id="file-fonts-conf-LC1304">	--&gt;</div><div class="line" id="file-fonts-conf-LC1305">	&lt;match target=&quot;font&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1306">		&lt;test qual=&quot;any&quot; name=&quot;family&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1307">			&lt;string&gt;Droid Sans&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1308">			&lt;string&gt;Droid Sans Mono&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1309">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC1310">		&lt;edit mode=&quot;assign&quot; name=&quot;autohint&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1311">			&lt;bool&gt;false&lt;/bool&gt;</div><div class="line" id="file-fonts-conf-LC1312">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1313">		&lt;edit mode=&quot;assign&quot; name=&quot;hintstyle&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1314">			&lt;const&gt;hintfull&lt;/const&gt;</div><div class="line" id="file-fonts-conf-LC1315">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1316">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC1317">&nbsp;</div><div class="line" id="file-fonts-conf-LC1318">	</div><div class="line" id="file-fonts-conf-LC1319">	&lt;match target=&quot;font&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1320">		&lt;test qual=&quot;any&quot; name=&quot;family&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1321">			&lt;string&gt;liberation mono&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1322">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC1323">		&lt;edit mode=&quot;assign&quot; name=&quot;autohint&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1324">			&lt;bool&gt;false&lt;/bool&gt;</div><div class="line" id="file-fonts-conf-LC1325">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1326">		&lt;edit mode=&quot;assign&quot; name=&quot;hintstyle&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1327">			&lt;const&gt;hintmedium&lt;/const&gt;</div><div class="line" id="file-fonts-conf-LC1328">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1329">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC1330">	</div><div class="line" id="file-fonts-conf-LC1331">	</div><div class="line" id="file-fonts-conf-LC1332">&nbsp;</div><div class="line" id="file-fonts-conf-LC1333">	</div><div class="line" id="file-fonts-conf-LC1334">	</div><div class="line" id="file-fonts-conf-LC1335">	</div><div class="line" id="file-fonts-conf-LC1336">	&lt;!-- time for stupid tricks for 2 stupid browsers, namely firefox and chrome --&gt;</div><div class="line" id="file-fonts-conf-LC1337">	&lt;!-- stupid trick for firefox </div><div class="line" id="file-fonts-conf-LC1338">		firefox obeys pixelsize but not size</div><div class="line" id="file-fonts-conf-LC1339">	--&gt;</div><div class="line" id="file-fonts-conf-LC1340">	&lt;match target=&quot;font&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1341">		&lt;test qual=&quot;any&quot; name=&quot;family&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1342">			&lt;string&gt;noto sans&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1343">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC1344">		&lt;test qual=&quot;any&quot; name=&quot;pixelsize&quot; compare=&quot;less&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1345">			&lt;double&gt;16&lt;/double&gt;</div><div class="line" id="file-fonts-conf-LC1346">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC1347">		&lt;test qual=&quot;any&quot; name=&quot;weight&quot; compare=&quot;more&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1348">			&lt;const&gt;medium&lt;/const&gt;</div><div class="line" id="file-fonts-conf-LC1349">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC1350">		&lt;edit mode=&quot;assign&quot; name=&quot;autohint&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1351">			&lt;bool&gt;true&lt;/bool&gt;</div><div class="line" id="file-fonts-conf-LC1352">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1353">		&lt;edit mode=&quot;assign&quot; name=&quot;hintstyle&quot; binding=&quot;weak&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1354">			&lt;const&gt;hintslight&lt;/const&gt;</div><div class="line" id="file-fonts-conf-LC1355">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC1356">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC1357">	</div><div class="line" id="file-fonts-conf-LC1358">	&lt;!-- </div><div class="line" id="file-fonts-conf-LC1359">		stupid trick for chrome </div><div class="line" id="file-fonts-conf-LC1360">		chrome obeys size, but not pixelsize below 17.4 pixel</div><div class="line" id="file-fonts-conf-LC1361">	--&gt;</div><div class="line" id="file-fonts-conf-LC1362">	&lt;match target=&quot;font&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1363">		&lt;test qual=&quot;any&quot; name=&quot;family&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1364">			&lt;string&gt;noto sans&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC1365">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC1366">		&lt;test qual=&quot;any&quot; name=&quot;size&quot; compare=&quot;less&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1367">			&lt;double&gt;16&lt;/double&gt;</div><div class="line" id="file-fonts-conf-LC1368">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC1369">		&lt;test qual=&quot;any&quot; name=&quot;weight&quot; compare=&quot;more&quot;&gt;</div><div class="line" id="file-fonts-conf-LC1370">			&lt;const&gt;medium&lt;/const&gt;</div><div class="line" id="file-fonts-conf-LC1371">		&lt;/test&gt;</div><div class=