uot; name=&quot;matrix&quot; compare=&quot;not_eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC626">	&lt;double&gt;0&lt;/double&gt;</div><div class="line" id="file-fonts-conf-LC627">	&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC628">	&lt;!-- another approach - no errors but freezes Firefox 1.5 --&gt;</div><div class="line" id="file-fonts-conf-LC629">	&lt;!--</div><div class="line" id="file-fonts-conf-LC630">	&lt;match target=&quot;font&quot;&gt;</div><div class="line" id="file-fonts-conf-LC631">	&lt;test qual=&quot;any&quot; name=&quot;matrix&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC632">	&lt;name&gt;matrix&lt;/name&gt;</div><div class="line" id="file-fonts-conf-LC633">	&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC634">	--&gt;</div><div class="line" id="file-fonts-conf-LC635">	&lt;edit name=&quot;antialias&quot; mode=&quot;assign&quot;&gt;</div><div class="line" id="file-fonts-conf-LC636">	&lt;bool&gt;true&lt;/bool&gt;</div><div class="line" id="file-fonts-conf-LC637">	&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC638">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC639">&nbsp;</div><div class="line" id="file-fonts-conf-LC640">	&lt;!--</div><div class="line" id="file-fonts-conf-LC641">		Substitute unavailable and/or unwanted fonts.</div><div class="line" id="file-fonts-conf-LC642">&nbsp;</div><div class="line" id="file-fonts-conf-LC643">		Aliases will not work if the actual fonts are installed.</div><div class="line" id="file-fonts-conf-LC644">		Replacing font family works in Firefox (FIXME: and other GTK-based apps?)</div><div class="line" id="file-fonts-conf-LC645">		QT-based apps also need font foundry replaced.</div><div class="line" id="file-fonts-conf-LC646">		Grouping fonts for substitution doesn&#39;t work in Firefox, so we need each</div><div class="line" id="file-fonts-conf-LC647">		font family replaced individually.</div><div class="line" id="file-fonts-conf-LC648">	--&gt;</div><div class="line" id="file-fonts-conf-LC649">&nbsp;</div><div class="line" id="file-fonts-conf-LC650">	&lt;!--</div><div class="line" id="file-fonts-conf-LC651">		sans-serif</div><div class="line" id="file-fonts-conf-LC652">		</div><div class="line" id="file-fonts-conf-LC653">		&quot;If the font still has no generic name, add sans-serif&quot;</div><div class="line" id="file-fonts-conf-LC654">		/etc/fonts.conf</div><div class="line" id="file-fonts-conf-LC655">&nbsp;</div><div class="line" id="file-fonts-conf-LC656">		Therefore, we only substitute what we need.</div><div class="line" id="file-fonts-conf-LC657">	--&gt;</div><div class="line" id="file-fonts-conf-LC658">	&lt;match target=&quot;pattern&quot;&gt;</div><div class="line" id="file-fonts-conf-LC659">		&lt;test qual=&quot;any&quot; name=&quot;family&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC660">			&lt;string&gt;Bitstream Charter&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC661">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC662">		&lt;edit name=&quot;family&quot; mode=&quot;append&quot; binding=&quot;same&quot;&gt;</div><div class="line" id="file-fonts-conf-LC663">			&lt;string&gt;serif&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC664">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC665">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC666">&nbsp;</div><div class="line" id="file-fonts-conf-LC667">	&lt;match target=&quot;pattern&quot;&gt;</div><div class="line" id="file-fonts-conf-LC668">		&lt;test qual=&quot;any&quot; name=&quot;family&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC669">			&lt;string&gt;Bitstream Vera Sans&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC670">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC671">		&lt;edit name=&quot;family&quot; mode=&quot;append&quot; binding=&quot;same&quot;&gt;</div><div class=