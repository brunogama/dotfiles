          <td class="line-data">
            <pre class="line-pre"><div class="line" id="file-fonts-conf-LC1">&lt;?xml version=&quot;1.0&quot;?&gt;</div><div class="line" id="file-fonts-conf-LC2">&lt;!DOCTYPE fontconfig SYSTEM &quot;fonts.dtd&quot;&gt;</div><div class="line" id="file-fonts-conf-LC3">&lt;fontconfig&gt;</div><div class="line" id="file-fonts-conf-LC4">&nbsp;</div><div class="line" id="file-fonts-conf-LC5">	&lt;!--</div><div class="line" id="file-fonts-conf-LC6">		Documented at</div><div class="line" id="file-fonts-conf-LC7">		http://linux.die.net/man/5/fonts-conf</div><div class="line" id="file-fonts-conf-LC8">			</div><div class="line" id="file-fonts-conf-LC9">		To check font mapping run the command at terminal</div><div class="line" id="file-fonts-conf-LC10">		$ fc-match &#39;helvetica Neue&#39;</div><div class="line" id="file-fonts-conf-LC11">		</div><div class="line" id="file-fonts-conf-LC12">		WARNING :: Droid Sans font with autohinter becomes bad, without autohinter looks great, but becomes smallish, cant help</div><div class="line" id="file-fonts-conf-LC13">		even the smallish is so good, that i am using it on desktop</div><div class="line" id="file-fonts-conf-LC14">		</div><div class="line" id="file-fonts-conf-LC15">		but cannot be used as a substitution for arial, since 12px (which is very common on websites) becomes small as if tahoma 10px</div><div class="line" id="file-fonts-conf-LC16">		</div><div class="line" id="file-fonts-conf-LC17">		Noto sans does better in this case, can be used as arial substitution without loss of size</div><div class="line" id="file-fonts-conf-LC18">		noto sans is slightly fatter than droid sans</div><div class="line" id="file-fonts-conf-LC19">		</div><div class="line" id="file-fonts-conf-LC20">		Open sans is much fat, and open sans bold looks bad, hence we choose noto sans as the replacement for arial</div><div class="line" id="file-fonts-conf-LC21">		</div><div class="line" id="file-fonts-conf-LC22">		</div><div class="line" id="file-fonts-conf-LC23">		Download the following fonts</div><div class="line" id="file-fonts-conf-LC24">		Droid fonts whole sets</div><div class="line" id="file-fonts-conf-LC25">		</div><div class="line" id="file-fonts-conf-LC26">		</div><div class="line" id="file-fonts-conf-LC27">		Download from google web fonts</div><div class="line" id="file-fonts-conf-LC28">		open sans all styles</div><div class="line" id="file-fonts-conf-LC29">		noto sans all styles</div><div class="line" id="file-fonts-conf-LC30">		noto serif all styles</div><div class="line" id="file-fonts-conf-LC31">	--&gt;</div><div class="line" id="file-fonts-conf-LC32">&nbsp;</div><div class="line" id="file-fonts-conf-LC33">	&lt;!--</div><div class="line" id="file-fonts-conf-LC34">		.fonts.conf</div><div class="line" id="file-fonts-conf-LC35">		release 6.3.23</div><div class="line" id="file-fonts-conf-LC36">		Licensed under GNU GPL</div><div class="line" id="file-fonts-conf-LC37">		================================</div><div class="line" id="file-fonts-conf-LC38">		LCD optimized 96 dpi</div><div class="line" id="file-fonts-conf-LC39">		&quot;Sharp&#39;N&#39;Clear&quot; font settings</div><div class="line" id="file-fonts-conf-LC40">		with emphasis on &#39;msttcorefonts&#39;</div><div class="line" id="file-fonts-conf-LC41">&nbsp;</div><div class="line" id="file-fonts-conf-LC42">		tested on Ubuntu GNU/Linux 5.10</div><div class="line" id="file-fonts-conf-LC43">		================================</div><div class="line" id="file-fonts-conf-LC44">		by Obi Bok</div><div class="line" id="file-fonts-conf-LC45">		Gmail: obibok</div><div class="line" id="file-fonts-conf-LC46">		http://linuxtuneup.blogspot.com</div><div class="line" id="file-fonts-conf-LC47">		================================</div><div class="line" id="file-fonts-conf-LC48">		Why was this conceived?</div><div class="line" id="file-fonts-conf-LC49">&nbsp;</div><div class="line" id="file-fonts-conf-LC50">		- some font families look better hinted by Byte Code Interpreter (BCI)</div><div class="line" id="file-fonts-conf-LC51">		while other fonts look better hinted by Auto-Hinter</div><div class="line" id="file-fonts-conf-LC52">		- hinting type affects italic and bold fonts differently</div><div class="line" id="file-fonts-conf-LC53">		- antialiasing needs to be adjusted according to font families and sizes</div><div class="line" id="file-fonts-conf-LC54">		</div><div class="line" id="file-fonts-conf-LC55">		Essentially, there is no one single rule that works for all fonts.</div><div class="line" id="file-fonts-conf-LC56">&nbsp;</div><div class="line" id="file-fonts-conf-LC57">		NOTE:</div><div class="line" id="file-fonts-conf-LC58">		- Verdana @ 8pt doesn&#39;t render &#39;2&#39; and &#39;6&#39; right</div><div class="line" id="file-fonts-conf-LC59">		- Arial shows &#39;Z&#39; distorted in Firefox 1.5</div><div class="line" id="file-fonts-conf-LC60">	--&gt;</div><div class="line" id="file-fonts-conf-LC61">&nbsp;</div><div class="line" id="file-fonts-conf-LC62">	&lt;!--</div><div class="line" id="file-fonts-conf-LC63">		Make font sizes match the dpi set in Xorg.</div><div class="line" id="file-fonts-conf-LC64">&nbsp;</div><div class="line" id="file-fonts-conf-LC65">		Increase or decrease this value if fonts are too small or too large</div><div class="line" id="file-fonts-conf-LC66">		for your screen resolution.</div><div class="line" id="file-fonts-conf-LC67">&nbsp;</div><div class="line" id="file-fonts-conf-LC68">		FIXME: this only affects QT-based apps?</div><div class="line" id="file-fonts-conf-LC69">	--&gt;</div><div class="line" id="file-fonts-conf-LC70">	&lt;match target=&quot;pattern&quot;&gt;</div><div class="line" id="file-fonts-conf-LC71">		&lt;edit name=&quot;dpi&quot; mode=&quot;assign&quot;&gt;</div><div class="line" id="file-fonts-conf-LC72">			&lt;double&gt;96&lt;/double&gt;</div><div class="line" id="file-fonts-conf-LC73">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC74">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC75">&nbsp;</div><div class="line" id="file-fonts-conf-LC76">	&lt;!--</div><div class="line" id="file-fonts-conf-LC77">		Enable anti-aliasing.</div><div class="line" id="file-fonts-conf-LC78">&nbsp;</div><div class="line" id="file-fonts-conf-LC79">		This only works for outline and scalable fonts.</div><div class="line" id="file-fonts-conf-LC80">		Bitmap and PostScript fonts do not get anti-aliased.</div><div class="line" id="file-fonts-conf-LC81">&nbsp;</div><div class="line" id="file-fonts-conf-LC82">		FIXME: is this correct?</div><div class="line" id="file-fonts-conf-LC83">	--&gt;</div><div class="line" id="file-fonts-conf-LC84">	&lt;match target=&quot;font&quot;&gt;</div><div class="line" id="file-fonts-conf-LC85">	&lt;edit name=&quot;antialias&quot; mode=&quot;assign&quot;&gt;</div><div class="line" id="file-fonts-conf-LC86">	&lt;bool&gt;true&lt;/bool&gt;</div><div class="line" id="file-fonts-conf-LC87">	&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC88">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC89">&nbsp;</div><div class="line" id="file-fonts-conf-LC90">	&lt;!--</div><div class="line" id="file-fonts-conf-LC91">		Set sub-pixel order if not detected.</div><div class="line" id="file-fonts-conf-LC92">&nbsp;</div><div class="line" id="file-fonts-conf-LC93">		&quot;X knows the sub pixel order already, and if this is enabled as well,</div><div class="line" id="file-fonts-conf-LC94">		Freetype produces some very strange results. However, if you do still</div><div class="line" id="file-fonts-conf-LC95">		have problems, consider (...) &#39;rgb&#39; (the standard for LCD monitors),</div><div class="line" id="file-fonts-conf-LC96">		&#39;bgr&#39; (unusual), &#39;vrgb&#39; (vertical rgb, if you have a monitor that</div><div class="line" id="file-fonts-conf-LC97">		has been rotated by 90 degrees[1]), &#39;vgbr&#39; (as vrgb, but very rare).&quot;</div><div class="line" id="file-fonts-conf-LC98">		&lt;http://www.linuxquestions.org/linux/answers/Hardware/\</div><div class="line" id="file-fonts-conf-LC99">		LCD_TFT_Monitor_Configuration_in_X_Org&gt;</div><div class="line" id="file-fonts-conf-LC100">&nbsp;</div><div class="line" id="file-fonts-conf-LC101">		Find out your LCD&#39;s sub-pixel order:</div><div class="line" id="file-fonts-conf-LC102">		&lt;http://grc.com/image/cleartype2c.gif&gt;</div><div class="line" id="file-fonts-conf-LC103">	--&gt;</div><div class="line" id="file-fonts-conf-LC104">	&lt;match target=&quot;font&quot;&gt;</div><div class="line" id="file-fonts-conf-LC105">	&lt;test qual=&quot;all&quot; name=&quot;rgba&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC106">	&lt;const&gt;unknown&lt;/const&gt;</div><div class="line" id="file-fonts-conf-LC107">	&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC108">	&lt;edit name=&quot;rgba&quot; mode=&quot;assign&quot;&gt;</div><div class="line" id="file-fonts-conf-LC109">	&lt;const&gt;rgb&lt;/const&gt;</div><div class="line" id="file-fonts-conf-LC110">	&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC111">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC112">&nbsp;</div><div class="line" id="file-fonts-conf-LC113">	&lt;!--</div><div class="line" id="file-fonts-conf-LC114">		Sub-pixel hinting via BCI enabled by default if compiled in.</div><div class="line" id="file-fonts-conf-LC115">&nbsp;</div><div class="line" id="file-fonts-conf-LC116">		&quot;Whole-pixel anti-aliasing does not represent a useful solution for</div><div class="line" id="file-fonts-conf-LC117">		improving small point-size type. (...) By &#39;borrowing&#39; sub-pixels from</div><div class="line" id="file-fonts-conf-LC118">		adjacent whole pixels, we can fine-tune the placement and width of typeface</div><div class="line" id="file-fonts-conf-LC119">		features with three times more horizontal accuracy then ever before!&quot;</div><div class="line" id="file-fonts-conf-LC120">		&lt;http://grc.com/ctwhat.htm&gt;</div><div class="line" id="file-fonts-conf-LC121">	--&gt;</div><div class="line" id="file-fonts-conf-LC122">&nbsp;</div><div class="line" id="file-fonts-conf-LC123">	&lt;!--</div><div class="line" id="file-fonts-conf-LC124">		Disable anti-aliasing for select fonts based on size and style.</div><div class="line" id="file-fonts-conf-LC125">&nbsp;</div><div class="line" id="file-fonts-conf-LC126">		| font                  | WinXP | Linux |</div><div class="line" id="file-fonts-conf-LC127">		=========================================</div><div class="line" id="file-fonts-conf-LC128">		Andale Mono IPA            14      13</div><div class="line" id="file-fonts-conf-LC129">		Arial                      12      13</div><div class="line" id="file-fonts-conf-LC130">		Arial Black                12      -</div><div class="line" id="file-fonts-conf-LC131">		Arial Narrow               14      13</div><div class="line" id="file-fonts-conf-LC132">		Berling Antiqua            12      13</div><div class="line" id="file-fonts-conf-LC133">		Book Antiqua               12      13</div><div class="line" id="file-fonts-conf-LC134">		Bookdings                  0       ?</div><div class="line" id="file-fonts-conf-LC135">		Bookman Old Style          22      13</div><div class="line" id="file-fonts-conf-LC136">		Century Gothic             16      16</div><div class="line" id="file-fonts-conf-LC137">		Comic Sans MS              11      9/11</div><div class="line" id="file-fonts-conf-LC138">		Courier New                26      22</div><div class="line" id="file-fonts-conf-LC139">		Franklin Gothic Medium     12      10/12</div><div class="line" id="file-fonts-conf-LC140">		Frutiger Linotype          12      10/12</div><div class="line" id="file-fonts-conf-LC141">		Garamond                   18      13/19</div><div class="line" id="file-fonts-conf-LC142">		Georgia                    12      12/13</div><div class="line" id="file-fonts-conf-LC143">		Impact                     16      0</div><div class="line" id="file-fonts-conf-LC144">		Kartika                    12      16</div><div class="line" id="file-fonts-conf-LC145">		Lucida Console             12      13</div><div class="line" id="file-fonts-conf-LC146">		Lucida Sans Typewriter     12      12</div><div class="line" id="file-fonts-conf-LC147">		Lucida Sans Unicode        12      10/13</div><div class="line" id="file-fonts-conf-LC148">		Marlett                    ?       ?</div><div class="line" id="file-fonts-conf-LC149">		Microsoft Sans Serif       12      12/13</div><div class="line" id="file-fonts-conf-LC150">		Palatino Linotype          12      13</div><div class="line" id="file-fonts-conf-LC151">		SylfaenARM                 -       13</div><div class="line" id="file-fonts-conf-LC152">		Symbol                     12      ?</div><div class="line" id="file-fonts-conf-LC153">		Tahoma                     12      12/13</div><div class="line" id="file-fonts-conf-LC154">		Times New Roman            12      13</div><div class="line" id="file-fonts-conf-LC155">		Trebuchet MS               12      12</div><div class="line" id="file-fonts-conf-LC156">		Verdana                    12      12</div><div class="line" id="file-fonts-conf-LC157">		Vrinda                     12      17</div><div class="line" id="file-fonts-conf-LC158">		Webdings                   20      ?</div><div class="line" id="file-fonts-conf-LC159">		Wingdings                  20      ?</div><div class="line" id="file-fonts-conf-LC160">		=========================================</div><div class="line" id="file-fonts-conf-LC161">&nbsp;</div><div class="line" id="file-fonts-conf-LC162">		&quot;The relationship of pixels to points depends on the number of pixels</div><div class="line" id="file-fonts-conf-LC163">		per inch, which is typically some &#39;standard&#39; value corresponding to</div><div class="line" id="file-fonts-conf-LC164">		default screen fonts. For example, MS Windows has two standard sets of</div><div class="line" id="file-fonts-conf-LC165">		screen fonts initially designed for IBM display systems: &#39;small&#39; (VGA)</div><div class="line" id="file-fonts-conf-LC166">		and &#39;large&#39; (8514/A). &#39;Small&#39; fonts are 96 pixels per inch, &#39;large&#39; are</div><div class="line" id="file-fonts-conf-LC167">		120. Macintosh systems render type at a nominal 72 pixels per inch, i.e.</div><div class="line" id="file-fonts-conf-LC168">		one pixel = one point. Some display systems using scalable screen fonts</div><div class="line" id="file-fonts-conf-LC169">		allow fine tuning of pixels per inch to suit user preferences.&quot;</div><div class="line" id="file-fonts-conf-LC170">		&lt;http://www.hpaa.com/css1/pxnpts.asp&gt;</div><div class="line" id="file-fonts-conf-LC171">&nbsp;</div><div class="line" id="file-fonts-conf-LC172">		X pt * 96 dpi / 72 dpi = Y px</div><div class="line" id="file-fonts-conf-LC173">	--&gt;</div><div class="line" id="file-fonts-conf-LC174">&nbsp;</div><div class="line" id="file-fonts-conf-LC175">	&lt;!--</div><div class="line" id="file-fonts-conf-LC176">		font group #1: normal roman anti-aliased above 10pt/13.4px</div><div class="line" id="file-fonts-conf-LC177">	--&gt;</div><div class="line" id="file-fonts-conf-LC178">	&lt;match target=&quot;font&quot;&gt;</div><div class="line" id="file-fonts-conf-LC179">		</div><div class="line" id="file-fonts-conf-LC180">		&lt;test qual=&quot;any&quot; name=&quot;family&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC181">			&lt;string&gt;Franklin Gothic Medium&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC182">			&lt;string&gt;Frutiger Linotype&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC183">			&lt;!-- Lucida Sans Unicode has no italic and uses artificial oblique --&gt;</div><div class="line" id="file-fonts-conf-LC184">			&lt;string&gt;Lucida Sans Unicode&lt;/string&gt;</div><div class="line" id="file-fonts-conf-LC185">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC186">		</div><div class="line" id="file-fonts-conf-LC187">		&lt;test qual=&quot;any&quot; name=&quot;pixelsize&quot; compare=&quot;less_eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC188">			&lt;double&gt;13.4&lt;/double&gt;</div><div class="line" id="file-fonts-conf-LC189">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC190">		</div><div class="line" id="file-fonts-conf-LC191">		&lt;test qual=&quot;any&quot; name=&quot;weight&quot; compare=&quot;less_eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC192">			&lt;const&gt;medium&lt;/const&gt;</div><div class="line" id="file-fonts-conf-LC193">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC194">		</div><div class="line" id="file-fonts-conf-LC195">		&lt;test qual=&quot;any&quot; name=&quot;slant&quot; compare=&quot;eq&quot;&gt;</div><div class="line" id="file-fonts-conf-LC196">			&lt;const&gt;roman&lt;/const&gt;</div><div class="line" id="file-fonts-conf-LC197">		&lt;/test&gt;</div><div class="line" id="file-fonts-conf-LC198">		</div><div class="line" id="file-fonts-conf-LC199">		&lt;edit name=&quot;antialias&quot; mode=&quot;assign&quot;&gt;</div><div class="line" id="file-fonts-conf-LC200">			&lt;bool&gt;false&lt;/bool&gt;</div><div class="line" id="file-fonts-conf-LC201">		&lt;/edit&gt;</div><div class="line" id="file-fonts-conf-LC202">&nbsp;</div><div class="line" id="file-fonts-conf-LC203">	&lt;/match&gt;</div><div class="line" id="file-fonts-conf-LC204">&nbsp;</div><div class="line" id="file-fonts-conf-LC205">	&lt;!--</div><div class="line" id="file-fonts-conf-LC206">		font group #2: normal roman anti-aliased above 11pt/14.7px</div><div class="line" id="file-fonts-conf-LC207">&nbsp;</div><div class="line" id="file-fonts-conf-LC208">		Must use 15px instead of 14.7px for this to work in QT-based apps</div><div class="line" id="file-fonts-conf-LC209">	--&gt;</div><div class="line" id="file-fonts-conf-LC210">	&lt;match target=&quot;font&quot;&gt;</div